<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propiedades en venta</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- =========================
     HERO / MENU IGUAL AL INDEX
========================= -->
<header class="hero">

    <video autoplay muted loop playsinline class="video-fondo">
        <source src="video/videoplayback.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">

        <div class="logo-titulo">
            <img src="logo.jpeg" class="logo" alt="Logo">
            <h1>Propiedades en venta</h1>
        </div>

        <p>Encuentra tu próximo hogar o inversión</p>

        <nav class="menu-hero">
            <a href="index.html">Inicio</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="propiedades.html">Propiedades</a>
            <a href="vende.html">Vende</a>
            <a href="contacto.html">Contacto</a>
        </nav>

    </div>

</header>

<!-- =========================
     BUSCADOR PREMIUM
========================= -->
<section class="buscador">

    <h2>Encuentra tu propiedad ideal</h2>

    <div class="buscador-card">

        <div class="buscador-header">
            <p>Filtra por ubicación, precio y tipo de inmueble</p>
        </div>

        <div class="grid-filtros">

            <select>
                <option value="">Departamento</option>
                <option>Amazonas</option>
                <option>Antioquia</option>
                <option>Arauca</option>
                <option>Atlántico</option>
                <option>Bolívar</option>
                <option>Boyacá</option>
                <option>Caldas</option>
                <option>Caquetá</option>
                <option>Casanare</option>
                <option>Cauca</option>
                <option>Cesar</option>
                <option>Chocó</option>
                <option>Córdoba</option>
                <option>Cundinamarca</option>
                <option>Guainía</option>
                <option>Guaviare</option>
                <option>Huila</option>
                <option>La Guajira</option>
                <option>Magdalena</option>
                <option>Meta</option>
                <option>Nariño</option>
                <option>Norte de Santander</option>
                <option>Putumayo</option>
                <option>Quindío</option>
                <option>Risaralda</option>
                <option>San Andrés y Providencia</option>
                <option>Santander</option>
                <option>Sucre</option>
                <option>Tolima</option>
                <option>Valle del Cauca</option>
                <option>Vaupés</option>
                <option>Vichada</option>
            </select>

            <input type="text" placeholder="Ciudad o municipio">

            <select>
                <option value="">Tipo de inmueble</option>
                <option>Casa</option>
                <option>Apartamento</option>
                <option>Lote</option>
                <option>Finca</option>
                <option>Bodega</option>
                <option>Local comercial</option>
            </select>

            <input type="number" placeholder="Precio mínimo (10000000)">
            <input type="number" placeholder="Precio máximo (2000000000)">

        </div>

        <button onclick="filtrarPropiedades()">🔍 Buscar propiedades</button>

    </div>

</section>

<!-- =========================
     PROPIEDADES (CARDS)
========================= -->
<section>

    <div class="grid-propiedades">

        <!-- PROPIEDAD 1 -->
        <a href="propiedad1.html" class="propiedad-card">
            <img src="Images/propiedad1.jpg" alt="">
            <h3>Casa en Ibagué</h3>
            <p>$180.000.000</p>
        </a>

        <!-- PROPIEDAD 2 -->
        <a href="propiedad2.html" class="propiedad-card">
            <img src="Images/propiedad2.jpg" alt="">
            <h3>Apartamento moderno</h3>
            <p>$250.000.000</p>
        </a>

    </div>

</section>
<script>
function filtrarPropiedades() {

    const dep = document.querySelectorAll(".buscador-card select")[0].value;
    const ciudad = document.querySelector(".buscador-card input[type='text']").value.toLowerCase();
    const tipo = document.querySelectorAll(".buscador-card select")[1].value;
    const min = Number(document.querySelectorAll(".buscador-card input[type='number']")[0].value || 0);
    const max = Number(document.querySelectorAll(".buscador-card input[type='number']")[1].value || 999999999999);

    const cards = document.querySelectorAll(".propiedad-card");

    let visibles = 0;

    cards.forEach(card => {

        const cardDep = card.dataset.departamento || "";
        const cardCiudad = (card.dataset.ciudad || "").toLowerCase();
        const cardTipo = card.dataset.tipo || "";
        const cardPrecio = Number(card.dataset.precio || 0);

        let mostrar = true;

        if (dep && cardDep !== dep) mostrar = false;
        if (ciudad && !cardCiudad.includes(ciudad)) mostrar = false;
        if (tipo && cardTipo !== tipo) mostrar = false;
        if (cardPrecio < min || cardPrecio > max) mostrar = false;

        if (mostrar) {
            card.style.display = "block";
            visibles++;
        } else {
            card.style.display = "none";
        }
    });

    alert("Propiedades encontradas: " + visibles);
}
</script>

</body>
</html>
