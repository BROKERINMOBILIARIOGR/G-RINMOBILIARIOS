<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propiedades en venta</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/propiedades.css">
</head>

<body>

<!-- =========================
     HERO
========================= -->
<header class="hero">

    <video autoplay muted loop playsinline class="video-fondo">
        <source src="video/videoplayback.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">

        <div class="logo-titulo">
            <img src="logo.jpeg" class="logo">
            <h1>Propiedades en venta</h1>
        </div>

        <p>Encuentra tu inmueble ideal</p>

        <nav class="menu-hero">
            <a href="index.html">Inicio</a>
            <a href="proyectos.html">Proyectos</a>
            <a href="propiedades.html">Propiedades</a>
            <a href="vende.html">Vende</a>
            <a href="contacto.html">Contacto</a>
        </nav>

    </div>

</header>

<!-- =========================
     BUSCADOR
========================= -->
<section class="buscador">

    <h2>Encuentra tu propiedad</h2>

    <div class="buscador-card">

        <div class="grid-filtros">

            <!-- Departamento -->
            <select id="departamento">
                <option value="">Departamento</option>
                <option value="Tolima">Tolima</option>
                <option value="Cundinamarca">Cundinamarca</option>
                <option value="Antioquia">Antioquia</option>
                <option value="Valle del Cauca">Valle del Cauca</option>
                <option value="Santander">Santander</option>
                <option value="Bolívar">Bolívar</option>
            </select>

            <!-- Ciudad -->
            <input type="text" id="ciudad" placeholder="Ciudad">

            <!-- Tipo -->
            <select id="tipo">
                <option value="">Tipo</option>
                <option value="Casa">Casa</option>
                <option value="Apartamento">Apartamento</option>
                <option value="Lote">Lote</option>
                <option value="Finca">Finca</option>
                <option value="Bodega">Bodega</option>
                <option value="Local">Local comercial</option>
            </select>

            <!-- Precio -->
            <input type="number" id="precioMax" placeholder="Precio máximo">

        </div>

        <button onclick="filtrarPropiedades()">Buscar</button>

    </div>

</section>

<!-- =========================
     PROPIEDADES
========================= -->
<section>

    <div class="grid-propiedades" id="listaPropiedades">

        <!-- PROPIEDAD 1 -->
        <div class="propiedad-card" data-departamento="Tolima" data-ciudad="Melgar" data-tipo="Casa" data-precio="180000000">

            <span class="precio">$180.000.000</span>

            <img src="Images/casa1.jpg">

            <h3>Casa campestre moderna</h3>

            <p class="ubicacion">Melgar, Tolima</p>

            <a class="btn-ver" href="detalle1.html" target="_blank">Ver más</a>
        </div>

        <!-- PROPIEDAD 2 -->
        <div class="propiedad-card" data-departamento="Cundinamarca" data-ciudad="Girardot" data-tipo="Apartamento" data-precio="120000000">

            <span class="precio">$120.000.000</span>

            <img src="Images/apto1.jpg">

            <h3>Apartamento central</h3>

            <p class="ubicacion">Girardot, Cundinamarca</p>

            <a class="btn-ver" href="detalle2.html" target="_blank">Ver más</a>
        </div>

    </div>

</section>

<!-- =========================
     SCRIPT FILTRO
========================= -->
<script>
function filtrarPropiedades(){

    let dep = document.getElementById("departamento").value.toLowerCase();
    let ciudad = document.getElementById("ciudad").value.toLowerCase();
    let tipo = document.getElementById("tipo").value.toLowerCase();
    let precioMax = parseInt(document.getElementById("precioMax").value);

    let cards = document.querySelectorAll(".propiedad-card");

    cards.forEach(card => {

        let cDep = card.getAttribute("data-departamento").toLowerCase();
        let cCiudad = card.getAttribute("data-ciudad").toLowerCase();
        let cTipo = card.getAttribute("data-tipo").toLowerCase();
        let cPrecio = parseInt(card.getAttribute("data-precio"));

        let mostrar =
            (dep === "" || cDep.includes(dep)) &&
            (ciudad === "" || cCiudad.includes(ciudad)) &&
            (tipo === "" || cTipo.includes(tipo)) &&
            (isNaN(precioMax) || cPrecio <= precioMax);

        card.style.display = mostrar ? "block" : "none";
    });
}
</script>

</body>
</html>
